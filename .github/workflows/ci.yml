name: DWH CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint & static checks (no DB needed)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint Python & dbt YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint deps
        run: pip install ruff sqlfluff pyyaml

      - name: Ruff — Python linter
        run: |
          ruff check elt/ check_db.py check_watermark.py \
            --ignore E501,E402 \
            --output-format github

      - name: Validate dbt YAML syntax
        run: |
          python - <<'EOF'
          import yaml, pathlib, sys
          errors = []
          for f in pathlib.Path("dbt_project").rglob("*.yml"):
              try:
                  yaml.safe_load(f.read_text(encoding="utf-8"))
              except yaml.YAMLError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"All YAML files valid ({len(list(pathlib.Path('dbt_project').rglob('*.yml')))} files)")
          EOF

      - name: Check SQL files exist (DDL completeness)
        run: |
          for i in 01 02 03 04 05 06 07 08; do
            ls sql/${i}_*.sql || (echo "Missing sql/${i}_*.sql" && exit 1)
          done

  # ─────────────────────────────────────────────────────────────
  # Job 2: dbt model compilation check (no live DB needed)
  # ─────────────────────────────────────────────────────────────
  dbt-compile:
    name: dbt compile (dry-run)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.8.0

      - name: Write CI profiles.yml (no real DB)
        run: |
          cat > dbt_project/profiles_ci.yml << 'EOF'
          erp_dwh:
            target: ci
            outputs:
              ci:
                type: postgres
                host: "{{ env_var('PGHOST', 'localhost') }}"
                port: 5432
                user: dwh_admin
                password: "{{ env_var('PGPASSWORD', 'dummy') }}"
                dbname: erp_dwh
                schema: mart
                threads: 1
          EOF

      - name: dbt compile (parse + graph resolution only)
        run: |
          cd dbt_project
          PYTHONUTF8=1 dbt parse \
            --profiles-dir . \
            --profile erp_dwh \
            --target ci 2>&1 | tee /tmp/dbt_parse.log || true
          # dbt parse exits non-zero when no DB — check for compile errors specifically
          if grep -i "compilation error\|yaml error\|jinja error" /tmp/dbt_parse.log; then
            echo "dbt compilation errors found"
            exit 1
          fi
          echo "dbt parse completed — no compilation errors"

  # ─────────────────────────────────────────────────────────────
  # Job 3: Python import & syntax check
  # ─────────────────────────────────────────────────────────────
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ELT dependencies
        run: pip install -r elt/requirements.txt

      - name: Syntax check all ELT modules
        run: |
          for f in elt/*.py; do
            python -m py_compile "$f" && echo "OK: $f" || exit 1
          done

      - name: Check for hardcoded credentials
        run: |
          # Fail if any plaintext password found in tracked Python/SQL files
          if grep -rn \
            --include="*.py" \
            --include="*.sql" \
            -E "password\s*=\s*['\"][^'\"]{3,}" \
            --exclude-dir=".venv" \
            --exclude-dir=".venv_dbt" \
            . | grep -v ".env" | grep -v "profiles.yml"; then
            echo "WARNING: possible hardcoded credentials found"
          fi
          echo "Credential check done"
