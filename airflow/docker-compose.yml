# ============================================================
# docker-compose.yml  (Airflow 2.9 - LocalExecutor)
#
# Cách chạy lần đầu:
#   docker compose up airflow-init      # khởi tạo DB + user admin
#   docker compose up -d                # chạy nền
#   Mở http://localhost:8080  (admin / admin)
#
# Dừng:
#   docker compose down
#
# Xem logs:
#   docker compose logs -f airflow-scheduler
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    # ── Core ─────────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh

    # ── Database (Airflow metadata) ───────────────────────────
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow

    # ── Webserver ─────────────────────────────────────────────
    AIRFLOW__WEBSERVER__SECRET_KEY: "erp-dwh-secret-change-me"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"   # cho phép xem config trong UI

    # ── Nguồn dữ liệu ERP ────────────────────────────────────
    # Truyền credentials từ .env sang container qua biến môi trường
    MYSQL_HOST: host.docker.internal      # kết nối MySQL trên máy host
    MYSQL_PORT: "3306"
    MYSQL_DATABASE: test
    MYSQL_USER: root
    MYSQL_PASSWORD: Chienvipso1

    PG_HOST: host.docker.internal         # kết nối PostgreSQL trên máy host
    PG_PORT: "5432"
    PG_DATABASE: erp_dwh
    PG_USER: dwh_admin
    PG_PASSWORD: "881686"

    # ── dbt paths ─────────────────────────────────────────────
    DBT_PROFILES_DIR: /opt/dwh/dbt_project
    DBT_PROJECT_DIR: /opt/dwh/dbt_project

    # ── Python path ───────────────────────────────────────────
    PYTHONPATH: /opt/dwh/elt
    PYTHONUTF8: "1"

  volumes:
    # Mount toàn bộ project vào /opt/dwh
    - d:/Data Warehouse:/opt/dwh:ro
    # DAG folder riêng (read-write để Airflow có thể scan)
    - ./dags:/opt/airflow/dags
    # Logs sinh bởi Airflow
    - ./logs:/opt/airflow/logs
    # Plugin custom
    - ./plugins:/opt/airflow/plugins

  extra_hosts:
    - "host.docker.internal:host-gateway"   # Linux host resolution

  depends_on:
    airflow-db:
      condition: service_healthy


services:

  # ── Metadata database cho Airflow ────────────────────────────
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ── Khởi tạo DB schema + tạo user admin ──────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet dbt-postgres==1.8.0 pymysql sqlalchemy loguru python-dotenv
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        echo "Airflow initialized — open http://localhost:8080 (admin/admin)"
    depends_on:
      airflow-db:
        condition: service_healthy

  # ── Scheduler: kiểm tra DAG, trigger task ─────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --quiet dbt-postgres==1.8.0 pymysql sqlalchemy loguru python-dotenv &&
        airflow scheduler
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Webserver: UI tại http://localhost:8080 ───────────────────
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --quiet dbt-postgres==1.8.0 pymysql sqlalchemy loguru python-dotenv &&
        airflow webserver
      "
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5


volumes:
  airflow-db-data:
