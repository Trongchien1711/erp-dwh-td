version: 2

models:
  - name: dim_customer_mart
    description: >
      Analysis-ready customer dimension shared across all domains.
      Grain: one row per customer. Strips ELT metadata and renames
      technical fields for BI readability.
    columns:
      - name: customer_key
        description: Surrogate PK
        tests: [not_null, unique]
      - name: customer_code
        description: ERP customer code
      - name: customer_name
        description: Full display name (renamed from fullname)
      - name: price_group_name
        description: Customer tier / price group

  - name: dim_material_mart
    description: >
      Analysis-ready NPL (nguyen phu lieu) dimension shared across
      Inventory and Production domains. Grain: one row per NPL item.
      Adds npl_type slicer and is_giay / is_zinc flags.
    columns:
      - name: material_key
        description: Surrogate PK (from core.dim_material)
        tests: [not_null, unique]
      - name: material_id
        description: Natural key from tbl_materials.id
        tests: [not_null]
      - name: material_code
        description: NPL code (e.g. VTDG-CAR3L1X-1)
      - name: material_name
        description: Full NPL name
      - name: is_zinc
        description: True = Kem in (zinc offset plate)
      - name: is_giay
        description: True = paper-family material (Giay cac loai)
      - name: npl_type
        description: BI slicer label (Kem in / Giay / Decal / Muc UV / Bao bi / Bang keo / Vat tu dong goi / Khac)

  - name: dim_product_mart
    description: >
      Analysis-ready product dimension shared across all domains.
      Grain: one row per product SKU.
    columns:
      - name: product_key
        description: Surrogate PK
        tests: [not_null, unique]
      - name: product_code
        description: ERP SKU / product code
      - name: product_name
        description: Product name
      - name: price_import
        description: "Standard import cost from ERP product master. WARNING: not populated in ERP — always 0."
      - name: price_sell
        description: "Standard sell price from ERP product master. WARNING: not populated in ERP — always 0."
      - name: avg_sell_price_actual
        description: >
          Quantity-weighted average selling price (VND) from actual order transactions
          across all available history. Based on unit_price_adjusted (spike-corrected).
          NULL if the product has never been sold.
      - name: median_sell_price_actual
        description: >
          Median selling price (VND) across all available history.
          Less sensitive to outliers than avg_sell_price_actual.
          NULL if the product has never been sold.
      - name: last_sell_price_actual
        description: Most recent actual selling price (VND) from the latest order line across all available history.
      - name: sold_order_count_12m
        description: Number of distinct orders containing this product across all available history.
      - name: price_tier
        description: >
          Product price band based on avg_sell_price_actual vs p33/p67 thresholds across all active SKUs.
          'Low' = cheapest third, 'Mid' = middle third, 'High' = most expensive third.
          NULL if the product has never been sold.
