version: 2

models:
  - name: stg_customers
    description: >
      Staging wrapper over core.dim_customer.
      One row per customer. Contains customer master data including
      denormalised price group (price_group_name, price_group_code).
    columns:
      - name: customer_key
        description: Surrogate primary key (SERIAL generated by ELT)
        tests: [not_null, unique]
      - name: customer_id
        description: Natural key — tblclients.userid from ERP
        tests: [not_null]
      - name: customer_code
        description: Customer code displayed in ERP UI
      - name: price_group_name
        description: Customer price tier name (e.g. Tier A, Retail)

  - name: stg_products
    description: >
      Staging wrapper over core.dim_product.
      One row per product SKU.
    columns:
      - name: product_key
        description: Surrogate primary key
        tests: [not_null, unique]
      - name: product_id
        description: Natural key — tbl_products.id from ERP
        tests: [not_null]
      - name: product_code
        description: SKU / product code displayed in ERP UI

  - name: stg_staff
    description: >
      Staging wrapper over core.dim_staff.
      One row per employee. "role" renamed to staff_role,
      "admin" renamed to is_admin.
    columns:
      - name: staff_key
        description: Surrogate primary key
        tests: [not_null, unique]
      - name: staff_id
        description: Natural key — tblstaff.id from ERP
        tests: [not_null]

  - name: stg_suppliers
    description: >
      Staging wrapper over core.dim_supplier.
      One row per supplier.
    columns:
      - name: supplier_key
        description: Surrogate primary key
        tests: [not_null, unique]
      - name: supplier_id
        description: Natural key — tblsuppliers.id from ERP
        tests: [not_null]

  - name: stg_warehouses
    description: >
      Staging wrapper over core.dim_warehouse.
      One row per warehouse.
    columns:
      - name: warehouse_key
        description: Surrogate primary key
        tests: [not_null, unique]
      - name: warehouse_id
        description: Natural key — tblwarehouse.id from ERP
        tests: [not_null]

  - name: stg_date
    description: >
      Date spine covering 2020-01-01 to 2030-12-31.
      Join on date_key (INT YYYYMMDD) from any fact table.
    columns:
      - name: date_key
        description: Integer date key in YYYYMMDD format (e.g. 20240115)
        tests: [not_null, unique]
      - name: full_date
        description: DATE type equivalent of date_key

  - name: stg_orders
    description: >
      Staging wrapper over core.fact_orders (partitioned table).
      One row per sales order header. Use is_cancel = 0 to exclude
      cancelled orders in downstream models.
    columns:
      - name: order_id
        description: Natural key — tbl_orders.id from ERP
        tests: [not_null]
      - name: order_date_key
        description: Date key (YYYYMMDD) — join to stg_date.date_key
        tests: [not_null]
      - name: customer_key
        description: FK → stg_customers.customer_key
      - name: grand_total
        description: Total order value including tax and delivery
      - name: total_cost
        description: Cost of goods sold for this order
      - name: total_profit
        description: gross_total - total_cost
      - name: is_cancel
        description: "1 = order was cancelled, 0 = active"

  - name: stg_order_items
    description: >
      Staging wrapper over core.fact_order_items (partitioned table).
      One row per product line on each order.
    columns:
      - name: order_item_id
        description: Natural key — tbl_order_items.id
        tests: [not_null]
      - name: order_id
        description: FK → stg_orders.order_id
      - name: product_key
        description: FK → stg_products.product_key
      - name: quantity
        description: Ordered quantity in base unit
      - name: total_amount
        description: Net line amount after discounts and tax
      - name: profit
        description: Line-level gross profit
